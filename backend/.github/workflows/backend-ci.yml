name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyphlab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cyphlab_test
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 7d
      RESEND_API_KEY: dummy_key_for_ci
      EMAIL_FROM: "CyphLab <onboarding@resend.dev>"
      FRONTEND_URL: http://localhost:3000
      PORT: 5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations against test DB
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Verify server boots (smoke test)
        run: |
          npm run start &
          SERVER_PID=$!
          sleep 5
          curl --fail http://localhost:5000/api/health
          kill $SERVER_PID
